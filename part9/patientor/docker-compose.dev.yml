services:
  app:
    image: patientor-frontend-dev
    build:
      context: ./frontend
      dockerfile: dev.Dockerfile 
    ports:
      - 5174:5173
    volumes:
      - ./frontend/:/usr/src/app 
    container_name: patientor-frontend-dev 

  server:
    image: patientor-backend-dev
    build:
      context: ./backend # The context will pick this directory as the "build context"
      dockerfile: dev.Dockerfile # This will simply tell which dockerfile to read
    ports:
      - 3001:3001
    volumes:
      - ./backend/:/usr/src/app
    container_name: patientor-backend-dev

  nginx:
    image: nginx:1.29
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    container_name: todo-reverse-proxy
    depends_on:
      - app
      - server